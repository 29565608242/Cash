<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改账号密码 - 线上记账系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {background: linear-gradient(135deg,#e0ecff 0%,#f7fafd 100%) fixed;min-height: 100vh;font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;display:flex;align-items:center;justify-content:center;padding:20px;color:#333;}
        .card {width:400px;padding:38px 36px 28px;box-shadow:0 8px 32px rgba(67,134,255,0.07),0 1.5px 12px #dbe7fa;border-radius:20px;background:#fff;text-align:center;}
        .logo {height:62px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;}
        .logo span{font-size:33px;font-weight:700;color:#409EFF;letter-spacing:3px;}
        h2{margin-bottom:6px;color:#3375b9;font-size:1.2rem;}
        .desc{color:#7e8a98;font-size:14px;margin-bottom:24px;}
        .form-group{text-align:left;margin-top:14px;}
        .form-group label{display:block;font-size:14px;font-weight:600;color:#596574;margin-bottom:6px;}
        input[type=text], input[type=password] {width:100%;padding:13px;border-radius:8px;border:1.2px solid #c7d3e5;transition:.2s;font-size:16px;background:#f8fbff;outline:none;}
        input[type=text]:focus, input[type=password]:focus {border-color:#409EFF;background:#f4f9ff;}
        .input-wrap{position:relative;}
        .input-wrap input{padding-right:42px;}
        .toggle-pwd{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#9aa6b2;font-size:16px;user-select:none;}
        .toggle-pwd:hover{color:#409EFF;}
        .btn {width:100%;background:linear-gradient(80deg,#53b8ff 0%,#409EFF 90%);color:#fff;font-size:17px;padding:12px 44px;border:none;border-radius:8px;margin-top:22px;cursor:pointer;font-weight:600;box-shadow:0 2px 8px rgba(64,158,255,.09);transition:.18s;}
        .btn:hover {box-shadow:0 5px 15px #a2c8fd;transform:translateY(-1px);background:linear-gradient(80deg,#439dff 0%,#227ada 100%);}
        .error-msg,.success-msg{padding:10px 12px;font-weight:500;font-size:14px;border-radius:6px;margin-bottom:18px;text-align:center;}
        .error-msg{color:#e94848;background:#ffeaea;}
        .success-msg{color:#2e9855;background:#eafcee;}
        .pwd-hint{text-align:left;font-size:12px;color:#9aa6b2;margin-top:5px;}
        .links{margin-top:20px;font-size:14px;color:#9aa6b2;}
        .links a{color:#409EFF;text-decoration:none;margin:0 6px;}
        .links a:hover{text-decoration:underline;}
        @media (max-width: 460px) {
            .card {width:100%;padding:32px 24px 24px;}
            .logo span{font-size:28px;}
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><span>线上记账系统</span></div>
        <h2>修改账号密码</h2>
        <p class="desc">输入用户名和当前密码后即可设置新密码</p>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="success-msg">{{ success }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('change_password') }}">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" value="{{ username or '' }}" required autofocus>
            </div>
            <div class="form-group">
                <label for="current_password">当前密码</label>
                <div class="input-wrap">
                    <input type="password" id="current_password" name="current_password" required>
                    <span class="toggle-pwd" onclick="togglePwd('current_password')">显示</span>
                </div>
            </div>
            <div class="form-group">
                <label for="new_password">新密码</label>
                <div class="input-wrap">
                    <input type="password" id="new_password" name="new_password" required minlength="6">
                    <span class="toggle-pwd" onclick="togglePwd('new_password')">显示</span>
                </div>
                <div class="pwd-hint">密码至少 6 位字符</div>
            </div>
            <div class="form-group">
                <label for="confirm_password">确认新密码</label>
                <div class="input-wrap">
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
                    <span class="toggle-pwd" onclick="togglePwd('confirm_password')">显示</span>
                </div>
            </div>
            <button type="submit" class="btn">保存新密码</button>
        </form>
        <div class="links">
            <a href="{{ url_for('forgot_password') }}">忘记密码</a>
            <span>|</span>
            <a href="{{ url_for('login') }}">返回登录</a>
        </div>
    </div>
    <script>
        function togglePwd(id) {
            const el = document.getElementById(id);
            const trigger = el.nextElementSibling;
            const show = el.type === 'password';
            el.type = show ? 'text' : 'password';
            trigger.textContent = show ? '隐藏' : '显示';
        }
    </script>
</body>
</html>
