<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户信息 - 线上记账系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {background: linear-gradient(135deg,#e0ecff 0%,#f7fafd 100%) fixed;min-height: 100vh;font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;padding: 40px 20px;color:#333;}

        .page-wrap {max-width: 560px;margin: 0 auto;}

        /* 顶部栏 */
        .top-bar {display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
        .top-bar a {color:#409EFF;text-decoration:none;font-size:15px;display:flex;align-items:center;gap:4px;}
        .top-bar a:hover {text-decoration:underline;}
        .top-bar .logout-btn {color:#e94848;}

        .card {background:#fff;border-radius:20px;padding:32px 30px 26px;box-shadow:0 8px 32px rgba(67,134,255,0.07),0 1.5px 12px #dbe7fa;margin-bottom:20px;}

        /* 头像区域 */
        .avatar-section {text-align:center;margin-bottom:28px;}
        .avatar-section .avatar-wrap {position:relative;display:inline-block;}
        .avatar-section .avatar-wrap img {width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid #e8f0fe;display:block;}
        .avatar-section .avatar-wrap .upload-overlay {position:absolute;bottom:0;right:0;width:32px;height:32px;background:#409EFF;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid #fff;transition:.2s;font-size:16px;color:#fff;}
        .avatar-section .avatar-wrap .upload-overlay:hover {background:#227ada;transform:scale(1.05);}
        .avatar-section .hint {font-size:13px;color:#aaa;margin-top:8px;}

        /* 表单 */
        .form-group {margin-bottom:18px;}
        .form-group label {display:block;font-size:14px;font-weight:600;color:#555;margin-bottom:6px;}
        .form-group input {width:100%;padding:12px 14px;border-radius:8px;border:1.2px solid #c7d3e5;transition:.2s;font-size:15px;background:#f8fbff;outline:none;}
        .form-group input:focus {border-color:#409EFF;background:#f4f9ff;}

        .btn {width:100%;background:linear-gradient(80deg,#53b8ff 0%,#409EFF 90%);color:#fff;font-size:16px;padding:12px;border:none;border-radius:8px;cursor:pointer;font-weight:600;box-shadow:0 2px 8px rgba(64,158,255,.15);transition:.18s;}
        .btn:hover {box-shadow:0 5px 15px #a2c8fd;transform:translateY(-1px);background:linear-gradient(80deg,#439dff 0%,#227ada 100%);}

        .btn-outline {background:transparent;color:#409EFF;border:1.5px solid #409EFF;box-shadow:none;}
        .btn-outline:hover {background:#ecf5ff;box-shadow:none;}

        .btn-danger {background:linear-gradient(80deg,#ff6b6b 0%,#e94848 90%);}
        .btn-danger:hover {background:linear-gradient(80deg,#e55555 0%,#d63030 100%);}

        .divider {height:1px;background:#eef2f7;margin:24px 0;}

        .section-title {font-size:16px;font-weight:700;color:#3375b9;margin-bottom:18px;text-align:center;}

        /* 消息 */
        .msg {padding:10px 14px;font-weight:500;font-size:14px;border-radius:8px;margin-bottom:18px;text-align:center;}
        .msg-error {color:#e94848;background:#ffeaea;}
        .msg-success {color:#2e9855;background:#eafcee;}

        .pwd-hint {font-size:12px;color:#aaa;margin-top:4px;}

        /* 密码切换 */
        .input-wrap {position:relative;}
        .input-wrap input {padding-right:38px;}
        .input-wrap .toggle-pwd {position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#aaa;font-size:18px;user-select:none;line-height:1;}
        .input-wrap .toggle-pwd:hover {color:#409EFF;}
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="top-bar">
            <a href="{{ url_for('index') }}">← 返回首页</a>
            <a href="{{ url_for('logout') }}" class="logout-btn">退出登录</a>
        </div>

        {% if error %}
            <div class="msg msg-error">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="msg msg-success">{{ success }}</div>
        {% endif %}

        <!-- 个人信息卡片 -->
        <div class="card">
            <div class="avatar-section">
                <div class="avatar-wrap">
                    <img id="avatarPreview"
                         src="{{ url_for('static', filename='avatars/' + (user.avatar or 'default_avatar.svg')) }}"
                         alt="用户头像">
                    <div class="upload-overlay" onclick="document.getElementById('avatarUpload').click()">✎</div>
                </div>
                <div class="hint">点击图标更换头像</div>
            </div>

            <form method="POST" action="{{ url_for('user_profile') }}" enctype="multipart/form-data">
                <input type="file" id="avatarUpload" name="avatar" accept="image/*" onchange="previewAvatar(event)" style="display:none;">

                <div class="form-group">
                    <label for="nickname">昵称</label>
                    <input type="text" id="nickname" name="nickname" value="{{ user.nickname or '' }}" placeholder="设置你的昵称">
                </div>

                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" value="{{ user.email or '' }}" placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="phone">手机号</label>
                    <input type="tel" id="phone" name="phone" value="{{ user.phone or '' }}" placeholder="请输入手机号">
                </div>

                <button type="submit" class="btn">保存个人信息</button>
            </form>
        </div>

        <!-- 修改密码卡片 -->
        <div class="card">
            <div class="section-title">修改密码</div>
            <form method="POST" action="{{ url_for('user_profile_change_password') }}">
                <div class="form-group">
                    <label for="current_password">当前密码</label>
                    <div class="input-wrap">
                        <input type="password" id="current_password" name="current_password" required placeholder="输入当前密码">
                        <span class="toggle-pwd" onclick="togglePwd('current_password')">👁</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="new_password">新密码</label>
                    <div class="input-wrap">
                        <input type="password" id="new_password" name="new_password" required placeholder="至少6位字符" minlength="6">
                        <span class="toggle-pwd" onclick="togglePwd('new_password')">👁</span>
                    </div>
                    <div class="pwd-hint">密码至少 6 位字符</div>
                </div>
                <div class="form-group">
                    <label for="confirm_password">确认新密码</label>
                    <div class="input-wrap">
                        <input type="password" id="confirm_password" name="confirm_password" required placeholder="再次输入新密码" minlength="6">
                        <span class="toggle-pwd" onclick="togglePwd('confirm_password')">👁</span>
                    </div>
                </div>
                <button type="submit" class="btn">更新密码</button>
            </form>
        </div>
    </div>

    <script>
        function previewAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatarPreview').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }
        function togglePwd(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
