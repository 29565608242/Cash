<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 线上记账系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {background: linear-gradient(135deg,#e0ecff 0%,#f7fafd 100%) fixed;min-height: 100vh;font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;align-items:center;justify-content:center;}
        .card {width:400px;padding:38px 36px 28px;box-shadow:0 8px 32px rgba(67,134,255,0.07),0 1.5px 12px #dbe7fa;border-radius:20px;background:#fff;text-align:center;}
        .logo {height:62px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;}
        .logo span{font-size:33px;font-weight:700;color:#409EFF;letter-spacing:3px;}
        h2{margin-bottom:6px;color:#3375b9;font-size:1.2rem;}
        .desc{color:#999;font-size:14px;margin-bottom:22px;}

        /* 步骤条 */
        .steps{display:flex;justify-content:center;gap:8px;margin-bottom:24px;}
        .step{display:flex;align-items:center;gap:6px;font-size:13px;color:#bbb;}
        .step.active{color:#409EFF;font-weight:600;}
        .step .num{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:#e8ecf1;color:#999;}
        .step.active .num{background:#409EFF;color:#fff;}
        .step.done .num{background:#67C23A;color:#fff;}
        .step-line{width:30px;height:1px;background:#ddd;align-self:center;}

        input[type=text], input[type=email], input[type=password] {width:100%;padding:13px;margin:12px 0 0;border-radius:8px;border:1.2px solid #c7d3e5;transition:.2s;font-size:16px;background:#f8fbff;outline:none;}
        input[type=text]:focus, input[type=email]:focus, input[type=password]:focus {border-color:#409EFF;background:#f4f9ff;}

        .input-wrap{position:relative;margin-top:12px;}
        .input-wrap input{margin-top:0;}
        .toggle-pwd{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#aaa;font-size:18px;user-select:none;}
        .toggle-pwd:hover{color:#409EFF;}

        .btn {width:100%;background:linear-gradient(80deg,#53b8ff 0%,#409EFF 90%);color:#fff;font-size:17px;padding:12px 44px;border:none;border-radius:8px;margin-top:20px;cursor:pointer;font-weight:600;box-shadow:0 2px 8px rgba(64,158,255,.09);transition:.18s;}
        .btn:hover {box-shadow:0 5px 15px #a2c8fd;transform:translateY(-1px);background:linear-gradient(80deg,#439dff 0%,#227ada 100%);}
        .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

        .error-msg,.success-msg{padding:10px 0 7px;font-weight:500;font-size:14px;border-radius:6px;margin:16px 0;}
        .error-msg{color:#e94848;background:#ffeaea;}
        .success-msg{color:#2e9855;background:#eafcee;}

        .back-link{display:inline-block;margin-top:20px;color:#409EFF;text-decoration:none;font-size:14px;}
        .back-link:hover{text-decoration:underline;}
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><span>线上记账系统</span></div>
        <h2>忘记密码</h2>
        <p class="desc">验证身份后即可重置登录密码</p>

        <div class="steps">
            <div class="step active">
                <span class="num">1</span> 验证身份
            </div>
            <div class="step-line"></div>
            <div class="step">
                <span class="num">2</span> 重置密码
            </div>
        </div>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="success-msg">{{ success }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="input-wrap">
                <input type="text" id="username" name="username" placeholder="用户名" required autofocus>
            </div>
            <div class="input-wrap">
                <input type="email" id="email" name="email" placeholder="注册时填写的邮箱" required>
            </div>
            <button type="submit" class="btn">发送重置链接</button>
        </form>
        <a href="{{ url_for('login') }}" class="back-link">← 返回登录</a>
    </div>
</body>
</html>
