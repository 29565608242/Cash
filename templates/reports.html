<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="财务报表">
    <title>财务报表 - 线上记账系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e6f2ff 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.6s ease-out; }

        /* 顶部导航 */
        .top-nav {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-nav h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-nav-actions { display: flex; gap: 15px; align-items: center; }
        .nav-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .nav-btn-home { background: #f4f4f4; color: #666; }
        .nav-btn-home:hover { transform: translateY(-2px); background: #e0e0e0; }

        /* 周期选择 */
        .period-bar {
            background: white;
            padding: 20px 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .period-tabs {
            display: flex;
            gap: 8px;
            background: #f5f5f5;
            padding: 5px;
            border-radius: 12px;
        }
        .period-tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .period-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }
        .period-tab:hover:not(.active) { background: #e8e8e8; }
        .custom-date-input {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .custom-date-input input[type="date"] {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .custom-date-input button {
            padding: 8px 16px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 22px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            text-align: center;
            border: 1px solid rgba(0,0,0,0.04);
            transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,0.1); }
        .stat-label { font-size: 0.85rem; color: #888; margin-bottom: 8px; font-weight: 500; }
        .stat-value { font-size: 1.6rem; font-weight: 700; }
        .stat-value.income { color: #10b981; }
        .stat-value.expense { color: #ef4444; }
        .stat-value.net.positive { color: #10b981; }
        .stat-value.net.negative { color: #ef4444; }
        .stat-value.count { color: #667eea; }
        .stat-sub { font-size: 0.75rem; color: #aaa; margin-top: 5px; }

        /* 图表区域 */
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 22px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .chart-card h3 {
            font-size: 1.05rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-container { width: 100%; height: 320px; }

        /* 交易明细 */
        .tx-list {
            background: white;
            border-radius: 15px;
            padding: 22px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .tx-list h3 {
            font-size: 1.05rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .tx-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        .tx-item:hover { background: #f8f9fa; }
        .tx-item:last-child { border-bottom: none; }
        .tx-left { display: flex; align-items: center; gap: 12px; }
        .tx-category { font-weight: 600; color: #333; }
        .tx-date { font-size: 0.8rem; color: #999; margin-top: 2px; }
        .tx-remark { font-size: 0.8rem; color: #aaa; margin-left: 8px; }
        .tx-amount { font-weight: 700; font-size: 1.1rem; }
        .tx-amount.income { color: #10b981; }
        .tx-amount.expense { color: #ef4444; }

        /* 导出按钮 */
        .export-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .export-btn-csv {
            background: #eef2ff;
            color: #4361ee;
            border: 1px solid #c7d2fe;
        }
        .export-btn-csv:hover { background: #dde4ff; }
        .export-btn-xlsx {
            background: #ecfdf5;
            color: #059669;
            border: 1px solid #a7f3d0;
        }
        .export-btn-xlsx:hover { background: #d1fae5; }
        .export-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.4; }
        .empty-state h4 { font-size: 1.15rem; margin-bottom: 8px; }

        /* 分页控件 */
        #txPagination {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 6px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: white;
            color: #555;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            min-width: 36px;
            text-align: center;
        }
        .page-btn:hover:not(:disabled):not(.page-btn-active) {
            background: #f0f2ff;
            border-color: #4361ee;
            color: #4361ee;
        }
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .page-btn-active {
            background: #4361ee;
            border-color: #4361ee;
            color: white;
        }
        .page-ellipsis {
            color: #999;
            padding: 0 4px;
            font-size: 0.85rem;
        }

        /* 通知 */
        .notification {
            position: fixed; top: 20px; right: 20px;
            padding: 15px 25px; border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000; transform: translateX(400px);
            transition: transform 0.3s;
        }
        .notification.show { transform: translateX(0); }
        .notification.success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
        .notification.error { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; }

        /* 响应式 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .top-nav { flex-direction: column; gap: 15px; padding: 20px; }
            .top-nav h1 { font-size: 1.3rem; }
            .top-nav-actions { width: 100%; }
            .nav-btn { width: 100%; justify-content: center; }
            .period-bar { flex-direction: column; align-items: stretch; }
            .period-tabs { overflow-x: auto; }
            .stats-grid { grid-template-columns: repeat(3, 1fr) !important; }
            .chart-row { grid-template-columns: 1fr; }
            .custom-date-input { flex-wrap: wrap; }
            .stat-value { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="notification" id="notification"></div>

    <div class="container">
        <!-- 导航 -->
        <div class="top-nav fade-in">
            <h1><span>📊</span>财务报表</h1>
            <div class="top-nav-actions">
                <a href="/" class="nav-btn nav-btn-home">← 返回首页</a>
                <a href="/data" class="nav-btn nav-btn-home">🔧 数据工具</a>
            </div>
        </div>

        <!-- 周期选择 -->
        <div class="period-bar fade-in">
            <div class="period-tabs">
                <button class="period-tab" data-period="week" onclick="changePeriod('week')">本周</button>
                <button class="period-tab active" data-period="month" onclick="changePeriod('month')">本月</button>
                <button class="period-tab" data-period="quarter" onclick="changePeriod('quarter')">本季度</button>
                <button class="period-tab" data-period="year" onclick="changePeriod('year')">本年</button>
                <button class="period-tab" data-period="custom" onclick="toggleCustomDate()">自定义</button>
            </div>
            <div class="custom-date-input" id="customDateInput" style="display:none;">
                <input type="date" id="startDate">
                <span>至</span>
                <input type="date" id="endDate">
                <button onclick="loadCustom()">查询</button>
            </div>
            <div class="export-actions" style="margin-left:auto;display:flex;align-items:center;gap:12px;">
                <span style="font-size:12px;color:#999;white-space:nowrap;">导出汇总统计 · <a href="/data" style="color:#409EFF;text-decoration:none;">明细导出→</a></span>
                <button class="export-btn export-btn-csv" onclick="downloadReport('csv')" title="导出汇总统计、每日趋势、分类占比">📥 报表 CSV</button>
                <button class="export-btn export-btn-xlsx" onclick="downloadReport('xlsx')" title="导出汇总统计、每日趋势、分类占比">📥 报表 XLSX</button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid fade-in" id="statsGrid" style="grid-template-columns:repeat(6, 1fr);">
            <div class="stat-card">
                <div class="stat-label">💰 总收入</div>
                <div class="stat-value income" id="statIncome">¥0.00</div>
                <div class="stat-sub" id="statIncomeCount">0 笔</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💸 总支出</div>
                <div class="stat-value expense" id="statExpense">¥0.00</div>
                <div class="stat-sub" id="statExpenseCount">0 笔</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📊 净结余</div>
                <div class="stat-value net" id="statNet">¥0.00</div>
                <div class="stat-sub">收入 - 支出</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📋 总笔数</div>
                <div class="stat-value count" id="statCount">0</div>
                <div class="stat-sub" id="statDateRange">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📅 日均支出</div>
                <div class="stat-value expense" id="statAvgDaily">¥0.00</div>
                <div class="stat-sub" id="statAvgDays">- 天</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🏆 支出最多</div>
                <div class="stat-value count" id="statTopCategory" style="font-size:1.1rem;">-</div>
                <div class="stat-sub" id="statTopCategoryInfo">-</div>
            </div>
        </div>

        <!-- 图表第一行 -->
        <div class="chart-row fade-in">
            <div class="chart-card">
                <h3>📈 收支趋势</h3>
                <div class="chart-container" id="trendChart"></div>
            </div>
            <div class="chart-card">
                <h3>🥧 支出分类占比</h3>
                <div class="chart-container" id="pieChart"></div>
            </div>
        </div>

        <!-- 图表第二行 -->
        <div class="chart-row fade-in">
            <div class="chart-card">
                <h3>💰 收入分类占比</h3>
                <div class="chart-container" id="incomePieChart"></div>
            </div>
            <div class="chart-card">
                <h3>📊 分类收支对比</h3>
                <div class="chart-container" id="categoryBarChart"></div>
            </div>
        </div>

        <!-- 交易明细 -->
        <div class="tx-list fade-in" id="txListSection">
            <h3>
                <span>📋 交易明细</span>
                <span style="font-size:0.8rem;color:#999;font-weight:400;" id="txCountLabel"></span>
            </h3>
            <div id="txList">
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <h4>暂无交易数据</h4>
                    <p>选择时间段查看报表统计</p>
                </div>
            </div>
            <div id="txPagination"></div>
        </div>
    </div>

    <script>
        let currentPeriod = 'month';
        let reportData = null;
        let trendChart = null;
        let pieChart = null;
        let incomePieChart = null;
        let categoryBarChart = null;
        let allTx = [];
        let txPage = 1;
        let txPerPage = 8;
        let txTotalPages = 1;

        document.addEventListener('DOMContentLoaded', function() {
            loadReport('month');
        });

        async function loadReport(period, startDate, endDate) {
            try {
                let url = `/api/reports/advanced?period=${period}`;
                if (period === 'custom' && startDate && endDate) {
                    url += `&start_date=${startDate}&end_date=${endDate}`;
                }
                const res = await fetch(url);
                const data = await res.json();
                if (data.success) {
                    reportData = data;
                    renderReport(data);
                } else {
                    showNotification(data.message || '加载失败', 'error');
                }
            } catch (e) {
                console.error('加载报表失败:', e);
                showNotification('加载报表失败', 'error');
            }
        }

        function renderReport(data) {
            const s = data.summary;

            // 统计卡片
            document.getElementById('statIncome').textContent = `¥${s.income.toFixed(2)}`;
            document.getElementById('statExpense').textContent = `¥${s.expense.toFixed(2)}`;
            document.getElementById('statCount').textContent = s.count;

            const netEl = document.getElementById('statNet');
            netEl.textContent = `${s.net >= 0 ? '+' : ''}¥${s.net.toFixed(2)}`;
            netEl.className = `stat-value net ${s.net >= 0 ? 'positive' : 'negative'}`;

            document.getElementById('statIncomeCount').textContent = `${data.income_category_stats.reduce((sum, c) => sum + c.count, 0)} 笔`;
            document.getElementById('statExpenseCount').textContent = `${data.expense_category_stats.reduce((sum, c) => sum + c.count, 0)} 笔`;
            document.getElementById('statDateRange').textContent = `${data.start_date} ~ ${data.end_date}`;

            // 新增统计卡片
            document.getElementById('statAvgDaily').textContent = `¥${s.avg_daily_expense.toFixed(2)}`;
            document.getElementById('statAvgDays').textContent = `${s.days} 天`;
            if (data.top_expense_category) {
                const top = data.top_expense_category;
                document.getElementById('statTopCategory').textContent = top.category;
                document.getElementById('statTopCategoryInfo').textContent = `¥${top.amount.toFixed(2)} (${top.count}笔)`;
            } else {
                document.getElementById('statTopCategory').textContent = '-';
                document.getElementById('statTopCategoryInfo').textContent = '暂无支出';
            }

            // 交易明细
            allTx = data.transactions || [];
            txPage = 1;
            renderTxList();

            // 图表
            renderTrendChart(data.daily_trend || []);
            renderPieChart(data.expense_category_stats || []);
            renderIncomePieChart(data.income_category_stats || []);
            renderCategoryBarChart(data.category_stats || []);
        }

        function renderTxList() {
            const container = document.getElementById('txList');
            const label = document.getElementById('txCountLabel');
            label.textContent = `共 ${allTx.length} 笔记录`;

            if (allTx.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <h4>暂无交易数据</h4>
                        <p>该时间段内没有交易记录</p>
                    </div>`;
                document.getElementById('txPagination').innerHTML = '';
                return;
            }

            txTotalPages = Math.max(1, Math.ceil(allTx.length / txPerPage));
            if (txPage > txTotalPages) txPage = txTotalPages;

            const start = (txPage - 1) * txPerPage;
            const end = start + txPerPage;
            const pageData = allTx.slice(start, end);

            container.innerHTML = pageData.map(t => `
                <div class="tx-item">
                    <div class="tx-left">
                        <span style="font-size:1.2rem;margin-right:4px;">${t.type === 'income' ? '💰' : '💸'}</span>
                        <div>
                            <div class="tx-category">${t.category || '未分类'}</div>
                            <div class="tx-date">${t.date} ${t.time || ''} ${t.remark ? '· ' + t.remark : ''}</div>
                        </div>
                    </div>
                    <div class="tx-amount ${t.type}">
                        ${t.type === 'income' ? '+' : '-'}¥${t.amount.toFixed(2)}
                    </div>
                </div>
            `).join('');

            renderTxPagination();
        }

        function renderTxPagination() {
            const container = document.getElementById('txPagination');
            if (txTotalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '<div class="pagination">';
            html += `<button class="page-btn" onclick="goToTxPage(${txPage - 1})" ${txPage <= 1 ? 'disabled' : ''}>‹ 上一页</button>`;

            let startPage = Math.max(1, txPage - 2);
            let endPage = Math.min(txTotalPages, txPage + 2);

            if (startPage > 1) {
                html += `<button class="page-btn" onclick="goToTxPage(1)">1</button>`;
                if (startPage > 2) html += `<span class="page-ellipsis">...</span>`;
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === txPage ? 'page-btn-active' : ''}" onclick="goToTxPage(${i})">${i}</button>`;
            }

            if (endPage < txTotalPages) {
                if (endPage < txTotalPages - 1) html += `<span class="page-ellipsis">...</span>`;
                html += `<button class="page-btn" onclick="goToTxPage(${txTotalPages})">${txTotalPages}</button>`;
            }

            html += `<button class="page-btn" onclick="goToTxPage(${txPage + 1})" ${txPage >= txTotalPages ? 'disabled' : ''}>下一页 ›</button>`;
            html += '</div>';
            container.innerHTML = html;
        }

        function goToTxPage(page) {
            if (page < 1 || page > txTotalPages) return;
            txPage = page;
            renderTxList();
            document.getElementById('txListSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderTrendChart(dailyData) {
            const dom = document.getElementById('trendChart');
            if (!trendChart) {
                trendChart = echarts.init(dom);
            }
            const dates = dailyData.map(d => d.date);
            const incomeData = dailyData.map(d => d.income);
            const expenseData = dailyData.map(d => d.expense);
            const netData = dailyData.map(d => d.income - d.expense);

            const option = {
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        let r = `<strong>${params[0].axisValue}</strong><br>`;
                        params.forEach(p => {
                            r += `${p.marker} ${p.seriesName}: ¥${p.value.toFixed(2)}<br>`;
                        });
                        // Add net balance
                        const income = params.find(p => p.seriesName === '收入');
                        const expense = params.find(p => p.seriesName === '支出');
                        if (income && expense) {
                            const net = income.value - expense.value;
                            r += `<br>📊 净结余: <span style="color:${net >= 0 ? '#10b981' : '#ef4444'}">${net >= 0 ? '+' : ''}¥${net.toFixed(2)}</span>`;
                        }
                        return r;
                    }
                },
                legend: { data: ['收入', '支出', '净结余'], bottom: 5 },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: { type: 'category', data: dates, axisLabel: { rotate: dates.length > 10 ? 30 : 0 } },
                yAxis: { type: 'value', name: '金额 (¥)' },
                series: [
                    {
                        name: '收入', type: 'line', data: incomeData, smooth: true,
                        itemStyle: { color: '#10b981' },
                        areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: 'rgba(16,185,129,0.3)' },
                                { offset: 1, color: 'rgba(16,185,129,0.05)' }
                            ]
                        }}
                    },
                    {
                        name: '支出', type: 'line', data: expenseData, smooth: true,
                        itemStyle: { color: '#ef4444' },
                        areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: 'rgba(239,68,68,0.3)' },
                                { offset: 1, color: 'rgba(239,68,68,0.05)' }
                            ]
                        }}
                    },
                    {
                        name: '净结余', type: 'bar', data: netData,
                        itemStyle: {
                            color: function(params) {
                                return params.value >= 0 ? '#10b981' : '#ef4444';
                            }
                        },
                        barWidth: '40%'
                    }
                ]
            };
            if (dates.length === 0) {
                option.title = { text: '暂无数据', left: 'center', top: 'center', textStyle: { color: '#ccc', fontSize: 16 } };
                option.xAxis.data = [];
                option.series.forEach(s => s.data = []);
            }
            trendChart.setOption(option, true);
            window.addEventListener('resize', () => trendChart.resize());
        }

        function renderPieChart(categoryStats) {
            const dom = document.getElementById('pieChart');
            if (!pieChart) {
                pieChart = echarts.init(dom);
            }

            const data = categoryStats.sort((a, b) => b.amount - a.amount).map(c => ({ name: c.category, value: c.amount }));

            const option = {
                tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
                legend: { bottom: 5, type: 'scroll' },
                series: [{
                    type: 'pie', radius: ['35%', '60%'], center: ['50%', '45%'],
                    data: data,
                    label: { formatter: '{b}\n¥{c}', fontSize: 11 },
                    emphasis: {
                        label: { show: true, fontSize: 14, fontWeight: 'bold' },
                        itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.2)' }
                    }
                }]
            };
            if (data.length === 0) {
                option.title = { text: '暂无支出数据', left: 'center', top: 'center', textStyle: { color: '#ccc', fontSize: 16 } };
                option.series[0].data = [];
            }
            pieChart.setOption(option, true);
            window.addEventListener('resize', () => pieChart.resize());
        }

        function renderIncomePieChart(categoryStats) {
            const dom = document.getElementById('incomePieChart');
            if (!incomePieChart) {
                incomePieChart = echarts.init(dom);
            }

            const data = categoryStats.sort((a, b) => b.amount - a.amount).map(c => ({ name: c.category, value: c.amount }));

            const option = {
                tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
                legend: { bottom: 5, type: 'scroll' },
                series: [{
                    type: 'pie', radius: ['35%', '60%'], center: ['50%', '45%'],
                    data: data,
                    label: { formatter: '{b}\n¥{c}', fontSize: 11 },
                    color: ['#10b981', '#34d399', '#6ee7b7', '#a7f3d0', '#d1fae5', '#6366f1', '#818cf8', '#a5b4fc'],
                    emphasis: {
                        label: { show: true, fontSize: 14, fontWeight: 'bold' },
                        itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.2)' }
                    }
                }]
            };
            if (data.length === 0) {
                option.title = { text: '暂无收入数据', left: 'center', top: 'center', textStyle: { color: '#ccc', fontSize: 16 } };
                option.series[0].data = [];
            }
            incomePieChart.setOption(option, true);
            window.addEventListener('resize', () => incomePieChart.resize());
        }

        function renderCategoryBarChart(categoryStats) {
            const dom = document.getElementById('categoryBarChart');
            if (!categoryBarChart) {
                categoryBarChart = echarts.init(dom);
            }

            // 获取所有唯一分类
            const catMap = {};
            categoryStats.forEach(c => {
                if (!catMap[c.category]) {
                    catMap[c.category] = { category: c.category, income: 0, expense: 0 };
                }
                if (c.type === 'income') {
                    catMap[c.category].income += c.amount;
                } else {
                    catMap[c.category].expense += c.amount;
                }
            });
            const categories = Object.keys(catMap);
            const incomeData = categories.map(c => catMap[c].income);
            const expenseData = categories.map(c => catMap[c].expense);

            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: function(params) {
                        let r = `<strong>${params[0].axisValue}</strong><br>`;
                        params.forEach(p => {
                            r += `${p.marker} ${p.seriesName}: ¥${p.value.toFixed(2)}<br>`;
                        });
                        return r;
                    }
                },
                legend: { data: ['收入', '支出'], bottom: 5 },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: { type: 'category', data: categories, axisLabel: { rotate: categories.length > 6 ? 30 : 0 } },
                yAxis: { type: 'value', name: '金额 (¥)' },
                series: [
                    {
                        name: '收入', type: 'bar', data: incomeData,
                        itemStyle: { color: '#10b981', borderRadius: [4, 4, 0, 0] },
                        barWidth: '30%'
                    },
                    {
                        name: '支出', type: 'bar', data: expenseData,
                        itemStyle: { color: '#ef4444', borderRadius: [4, 4, 0, 0] },
                        barWidth: '30%'
                    }
                ]
            };
            if (categories.length === 0) {
                option.title = { text: '暂无数据', left: 'center', top: 'center', textStyle: { color: '#ccc', fontSize: 16 } };
            }
            categoryBarChart.setOption(option, true);
            window.addEventListener('resize', () => categoryBarChart.resize());
        }

        function changePeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-tab').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.period === period) btn.classList.add('active');
            });
            if (period === 'custom') {
                document.getElementById('customDateInput').style.display = 'flex';
                return;
            }
            document.getElementById('customDateInput').style.display = 'none';
            loadReport(period);
        }

        function toggleCustomDate() {
            const el = document.getElementById('customDateInput');
            el.style.display = el.style.display === 'none' ? 'flex' : 'none';
            if (el.style.display === 'flex') {
                document.getElementById('startDate').value = '';
                document.getElementById('endDate').value = '';
            }
        }

        function loadCustom() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if (!start || !end) {
                showNotification('请选择起止日期', 'error');
                return;
            }
            if (start > end) {
                showNotification('开始日期不能晚于结束日期', 'error');
                return;
            }
            loadReport('custom', start, end);
        }

        function downloadReport(format) {
            if (!reportData) {
                showNotification('请先加载报表数据', 'error');
                return;
            }
            const period = currentPeriod;
            let startDate = '';
            let endDate = '';
            if (period === 'custom') {
                startDate = document.getElementById('startDate').value;
                endDate = document.getElementById('endDate').value;
            }
            const url = `/api/reports/download?period=${period}&format=${format}${startDate ? '&start_date=' + startDate : ''}${endDate ? '&end_date=' + endDate : ''}`;
            window.location.href = url;
            showNotification(`正在导出 ${format.toUpperCase()} 文件...`, 'success');
        }

        function showNotification(message, type = 'success') {
            const el = document.getElementById('notification');
            el.textContent = message;
            el.className = `notification ${type} show`;
            setTimeout(() => el.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
